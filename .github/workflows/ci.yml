name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Type Check
        run: |
          python -m compileall app
      - name: Mypy
        run: |
          python -m mypy app/core/config.py app/services/download_api_client.py --follow-imports=skip --ignore-missing-imports --disable-error-code=import-untyped
      - name: Lint
        run: |
          python -m flake8 app
      - name: Test
        run: |
          python -m pytest -q

  backend_integration:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Start Stub Server
        run: |
          python -m pip install uvicorn
          python -m uvicorn scripts.download_api_stub:app --host 127.0.0.1 --port 8080 &
          python - << 'PY'
          import time
          import httpx
          for _ in range(30):
              try:
                  r = httpx.get("http://127.0.0.1:8080/health", timeout=1)
                  if r.status_code == 200:
                      raise SystemExit(0)
              except Exception:
                  time.sleep(0.5)
          raise SystemExit(1)
          PY
      - name: Test Integration
        run: |
          python -m pytest -q -m integration

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: |
          npm ci
      - name: Lint
        run: |
          npm run lint
      - name: Build
        run: |
          npm run build

