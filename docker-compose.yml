# AI新媒体专家系统 Docker Compose配置

version: '3.8'

services:
  # 主应用服务
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./ai_media_expert.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=dev-secret-key-change-in-production
      - JWT_SECRET_KEY=dev-jwt-secret-key-change-in-production
      - DEBUG=true
      - ENVIRONMENT=development
    volumes:
      - ./uploads:/app/uploads
      - ./downloads:/app/downloads
      - ./models:/app/models
      - ./logs:/app/logs
      - ./.env:/app/.env
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - ai-media-network

  # Redis缓存和消息队列
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ai-media-network
    command: redis-server --appendonly yes

  # Celery Worker (用于后台任务)
  celery-worker:
    build: .
    command: celery -A app.tasks.celery worker --loglevel=info
    environment:
      - DATABASE_URL=sqlite:///./ai_media_expert.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=dev-secret-key-change-in-production
      - JWT_SECRET_KEY=dev-jwt-secret-key-change-in-production
      - DEBUG=true
      - ENVIRONMENT=development
    volumes:
      - ./uploads:/app/uploads
      - ./downloads:/app/downloads
      - ./models:/app/models
      - ./logs:/app/logs
      - ./.env:/app/.env
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - ai-media-network

  # Celery Beat (用于定时任务)
  celery-beat:
    build: .
    command: celery -A app.tasks.celery beat --loglevel=info
    environment:
      - DATABASE_URL=sqlite:///./ai_media_expert.db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=dev-secret-key-change-in-production
      - JWT_SECRET_KEY=dev-jwt-secret-key-change-in-production
      - DEBUG=true
      - ENVIRONMENT=development
    volumes:
      - ./uploads:/app/uploads
      - ./downloads:/app/downloads
      - ./models:/app/models
      - ./logs:/app/logs
      - ./.env:/app/.env
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - ai-media-network

  # Flower (Celery监控界面)
  flower:
    build: .
    command: celery -A app.tasks.celery flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - ai-media-network

# 数据卷
volumes:
  redis_data:
    driver: local

# 网络
networks:
  ai-media-network:
    driver: bridge