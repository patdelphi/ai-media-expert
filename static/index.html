<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI新媒体专家系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-video"></i>
                <span>AI新媒体专家</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="#dashboard" class="nav-link active" data-page="dashboard">
                        <i class="fas fa-tachometer-alt"></i> 仪表板
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#upload" class="nav-link" data-page="upload">
                        <i class="fas fa-upload"></i> 视频上传
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#library" class="nav-link" data-page="library">
                        <i class="fas fa-folder-open"></i> 视频库
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#analysis" class="nav-link" data-page="analysis">
                        <i class="fas fa-brain"></i> 内容分析
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- 主内容区域 -->
    <main class="main-content">
        <!-- 仪表板页面 -->
        <div id="dashboard-page" class="page active">
            <div class="page-header">
                <h1><i class="fas fa-tachometer-alt"></i> 系统仪表板</h1>
                <p>欢迎使用AI新媒体专家系统</p>
            </div>
            
            <div class="dashboard-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-video"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="total-videos">0</h3>
                        <p>总视频数</p>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-download"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="total-downloads">0</h3>
                        <p>下载任务</p>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-brain"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="total-analysis">0</h3>
                        <p>分析任务</p>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="completed-tasks">0</h3>
                        <p>已完成</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 视频上传页面 -->
        <div id="upload-page" class="page">
            <div class="page-header">
                <h1><i class="fas fa-upload"></i> 视频上传</h1>
                <p>上传视频文件进行分析处理</p>
            </div>
            
            <div class="upload-container">
                <form id="upload-form" class="upload-form">
                    <div class="upload-area" id="upload-area">
                        <div class="upload-icon">
                            <i class="fas fa-cloud-upload-alt"></i>
                        </div>
                        <h3>拖拽文件到此处或点击选择</h3>
                        <p>支持 MP4, AVI, MOV, MKV 等格式</p>
                        <input type="file" id="file-input" multiple accept="video/*" hidden>
                        <button type="button" class="btn btn-primary" onclick="document.getElementById('file-input').click()">
                            选择文件
                        </button>
                    </div>
                    
                    <div class="upload-options">
                        <div class="form-group">
                            <label for="video-title">视频标题</label>
                            <input type="text" id="video-title" class="form-control" placeholder="输入视频标题">
                        </div>
                        
                        <div class="form-group">
                            <label for="video-description">视频描述</label>
                            <textarea id="video-description" class="form-control" rows="3" placeholder="输入视频描述"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="auto-analyze" checked>
                                <span class="checkmark"></span>
                                上传后自动分析
                            </label>
                        </div>
                        
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-upload"></i> 开始上传
                        </button>
                    </div>
                </form>
                
                <div id="upload-progress" class="upload-progress" style="display: none;">
                    <h3>上传进度</h3>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <p id="progress-text">0%</p>
                </div>
            </div>
        </div>

        <!-- 视频库页面 -->
        <div id="library-page" class="page">
            <div class="page-header">
                <h1><i class="fas fa-folder-open"></i> 视频库</h1>
                <p>管理您的视频资源</p>
            </div>
            
            <div class="library-container">
                <div class="library-filters">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="搜索视频...">
                    </div>
                    
                    <div class="filter-options">
                        <select id="platform-filter" class="form-control">
                            <option value="">全部平台</option>
                            <option value="local">本地上传</option>
                            <option value="youtube">YouTube</option>
                            <option value="tiktok">TikTok</option>
                        </select>
                        
                        <select id="status-filter" class="form-control">
                            <option value="">全部状态</option>
                            <option value="uploaded">已上传</option>
                            <option value="analyzed">已分析</option>
                        </select>
                    </div>
                </div>
                
                <div id="video-grid" class="video-grid">
                    <!-- 视频卡片将通过JavaScript动态加载 -->
                </div>
                
                <div class="pagination">
                    <div class="pagination-controls">
                        <button class="btn btn-outline btn-pagination" id="prev-btn" disabled>
                            <i class="fas fa-chevron-left"></i> 上一页
                        </button>
                        <button class="btn btn-outline btn-pagination" id="next-btn">
                            下一页 <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                    <div class="pagination-info">
                        <span class="page-info" id="page-info">第 1 页，共 1 页</span>
                        <div class="page-size-selector">
                            <label>每页显示：</label>
                            <select class="page-size-select" id="page-size">
                                <option value="12">12</option>
                                <option value="24" selected>24</option>
                                <option value="48">48</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 内容分析页面 -->
        <div id="analysis-page" class="page">
            <div class="page-header">
                <h1><i class="fas fa-brain"></i> 内容分析</h1>
                <p>AI智能分析视频内容</p>
            </div>
            
            <div class="analysis-container">
                <div class="analysis-form">
                    <div class="form-group">
                        <label for="analysis-video">选择视频</label>
                        <select id="analysis-video" class="form-control">
                            <option value="">请选择要分析的视频</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>分析类型</label>
                        <div class="analysis-types">
                            <label class="radio-label">
                                <input type="radio" name="analysis-type" value="visual" checked>
                                <span class="radio-mark"></span>
                                <div class="analysis-option">
                                    <i class="fas fa-eye"></i>
                                    <span>视觉分析</span>
                                </div>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="analysis-type" value="audio">
                                <span class="radio-mark"></span>
                                <div class="analysis-option">
                                    <i class="fas fa-volume-up"></i>
                                    <span>音频分析</span>
                                </div>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="analysis-type" value="full">
                                <span class="radio-mark"></span>
                                <div class="analysis-option">
                                    <i class="fas fa-magic"></i>
                                    <span>全面分析</span>
                                </div>
                            </label>
                        </div>
                    </div>
                    
                    <button type="button" class="btn btn-primary" id="start-analysis">
                        <i class="fas fa-brain"></i> 开始分析
                    </button>
                </div>
                
                <div id="analysis-results" class="analysis-results" style="display: none;">
                    <h3>分析结果</h3>
                    <div id="results-content">
                        <!-- 分析结果将通过JavaScript动态加载 -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 通知容器 -->
    <div id="notifications" class="notifications"></div>

    <!-- 加载指示器 -->
    <div id="loading" class="loading" style="display: none;">
        <div class="spinner"></div>
        <p>处理中...</p>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
