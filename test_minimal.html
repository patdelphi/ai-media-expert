<!DOCTYPE html>
<html>
<head>
    <title>最简上传测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        button { padding: 10px 20px; margin: 5px; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
        input[type="file"] { margin: 10px 0; }
    </style>
</head>
<body>
    <h1>最简化文件上传测试</h1>
    
    <div class="test-section">
        <h3>1. 健康检查</h3>
        <button onclick="testHealth()">测试连接</button>
        <div id="health-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>2. 最简文件上传</h3>
        <input type="file" id="test-file">
        <br>
        <button onclick="testMinimalUpload()">测试上传</button>
        <div id="upload-result" class="result"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api/v1';
        
        async function testHealth() {
            const result = document.getElementById('health-result');
            try {
                const response = await fetch(`${API_BASE}/minimal/health`);
                const data = await response.json();
                
                if (response.ok) {
                    result.className = 'result success';
                    result.textContent = `✅ 连接成功: ${data.status}`;
                } else {
                    result.className = 'result error';
                    result.textContent = `❌ 连接失败: ${response.status}`;
                }
            } catch (error) {
                result.className = 'result error';
                result.textContent = `❌ 连接错误: ${error.message}`;
            }
        }
        
        async function testMinimalUpload() {
            const result = document.getElementById('upload-result');
            const fileInput = document.getElementById('test-file');
            
            if (!fileInput.files[0]) {
                result.className = 'result error';
                result.textContent = '❌ 请选择一个文件';
                return;
            }
            
            try {
                const file = fileInput.files[0];
                
                result.className = 'result';
                result.textContent = '⏳ 正在上传...';
                
                const formData = new FormData();
                formData.append('file', file);
                
                console.log('上传文件:', file.name, '大小:', file.size, '类型:', file.type);
                
                const response = await fetch(`${API_BASE}/minimal/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                console.log('响应状态:', response.status);
                const data = await response.json();
                console.log('响应数据:', data);
                
                if (response.ok) {
                    result.className = 'result success';
                    result.textContent = `✅ 上传成功！文件: ${data.filename}, 大小: ${data.size} 字节, 类型: ${data.content_type}`;
                } else {
                    result.className = 'result error';
                    result.textContent = `❌ 上传失败: ${data.detail || response.status}`;
                }
            } catch (error) {
                console.error('上传错误:', error);
                result.className = 'result error';
                result.textContent = `❌ 上传错误: ${error.message}`;
            }
        }
        
        // 页面加载时自动测试连接
        window.onload = function() {
            testHealth();
        };
    </script>
</body>
</html>
