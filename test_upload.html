<!DOCTYPE html>
<html>
<head>
    <title>视频上传测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        button { padding: 10px 20px; margin: 5px; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>视频上传系统测试</h1>
    
    <div class="test-section">
        <h3>1. 后端API连接测试</h3>
        <button onclick="testBackendConnection()">测试后端连接</button>
        <div id="backend-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>2. 认证测试</h3>
        <button onclick="testAuth()">测试认证状态</button>
        <div id="auth-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>3. 上传初始化测试</h3>
        <button onclick="testUploadInit()">测试上传初始化</button>
        <div id="init-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>4. 分片上传测试</h3>
        <input type="file" id="test-file" accept="video/*">
        <button onclick="testChunkUpload()">测试分片上传</button>
        <div id="chunk-result" class="result"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api/v1';
        
        async function testBackendConnection() {
            const result = document.getElementById('backend-result');
            try {
                const response = await fetch(`${API_BASE}/health`);
                if (response.ok) {
                    result.className = 'result success';
                    result.textContent = '✅ 后端连接正常';
                } else {
                    result.className = 'result error';
                    result.textContent = `❌ 后端连接失败: ${response.status}`;
                }
            } catch (error) {
                result.className = 'result error';
                result.textContent = `❌ 连接错误: ${error.message}`;
            }
        }
        
        async function testAuth() {
            const result = document.getElementById('auth-result');
            try {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    result.className = 'result error';
                    result.textContent = '❌ 未找到认证令牌，请先登录';
                    return;
                }
                
                const response = await fetch(`${API_BASE}/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    result.className = 'result success';
                    result.textContent = `✅ 认证成功，用户: ${data.data.username}`;
                } else {
                    result.className = 'result error';
                    result.textContent = `❌ 认证失败: ${response.status}`;
                }
            } catch (error) {
                result.className = 'result error';
                result.textContent = `❌ 认证错误: ${error.message}`;
            }
        }
        
        async function testUploadInit() {
            const result = document.getElementById('init-result');
            try {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    result.className = 'result error';
                    result.textContent = '❌ 请先登录';
                    return;
                }
                
                const response = await fetch(`${API_BASE}/upload/init`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        filename: 'test.mp4',
                        file_size: 1048576,
                        chunk_size: 1048576,
                        title: '测试视频',
                        description: '上传测试'
                    })
                });
                
                const data = await response.json();
                if (response.ok && data.code === 200) {
                    result.className = 'result success';
                    result.textContent = `✅ 上传初始化成功，会话ID: ${data.data.upload_session_id}`;
                    window.testSessionId = data.data.upload_session_id;
                } else {
                    result.className = 'result error';
                    result.textContent = `❌ 初始化失败: ${data.message || response.status}`;
                }
            } catch (error) {
                result.className = 'result error';
                result.textContent = `❌ 初始化错误: ${error.message}`;
            }
        }
        
        async function testChunkUpload() {
            const result = document.getElementById('chunk-result');
            const fileInput = document.getElementById('test-file');
            
            if (!fileInput.files[0]) {
                result.className = 'result error';
                result.textContent = '❌ 请选择一个视频文件';
                return;
            }
            
            if (!window.testSessionId) {
                result.className = 'result error';
                result.textContent = '❌ 请先执行上传初始化测试';
                return;
            }
            
            try {
                const token = localStorage.getItem('access_token');
                const file = fileInput.files[0];
                const chunkSize = 1024 * 1024; // 1MB
                const chunk = file.slice(0, Math.min(chunkSize, file.size));
                
                const formData = new FormData();
                formData.append('upload_session_id', window.testSessionId);
                formData.append('chunk_index', '0');
                formData.append('total_chunks', '1');
                
                const chunkFile = new File([chunk], 'chunk_0', {
                    type: 'application/octet-stream'
                });
                formData.append('chunk_file', chunkFile);
                
                const response = await fetch(`${API_BASE}/upload/chunk`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });
                
                const data = await response.json();
                if (response.ok && data.code === 200) {
                    result.className = 'result success';
                    result.textContent = `✅ 分片上传成功: ${data.message}`;
                } else {
                    result.className = 'result error';
                    result.textContent = `❌ 分片上传失败: ${data.message || response.status}`;
                }
            } catch (error) {
                result.className = 'result error';
                result.textContent = `❌ 分片上传错误: ${error.message}`;
            }
        }
    </script>
</body>
</html>
